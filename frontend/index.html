<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable System - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <h1>&#128197; Timetable System</h1>
    <p class="subtitle">Admin Login</p>

    <div id="errorMsg" class="error-msg">Invalid username or password.</div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>

    <p class="login-hint">Default: username <span>admin</span> / password <span>admin123</span></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
